name: Regenerate Gallery Index

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run gallery generator
        run: node scripts/generate-gallery-index.js

      - name: Print generated index for debugging
        if: always()
        run: |
          echo "---- Gallery/index.html (start) ----"
          if [ -f Gallery/index.html ]; then
            sed -n '1,400p' Gallery/index.html
          else
            echo "Gallery/index.html not found"
          fi
          echo "---- Gallery/index.html (end) ----"

      - name: Commit generated index if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gallery/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Regenerate gallery index"
            git push
          fi
