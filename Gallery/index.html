---
layout: default
title: Galleries
---

<!DOCTYPE HTML>
<html>
<head>
    {% include header.html %}
    <style>
        .galleries-list {
            list-style: none;
            padding: 0;
        }
        .galleries-list li {
            margin: 15px 0;
        }
        .galleries-list a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0f0f0;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.3s;
        }
        .galleries-list a:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Photo Galleries</h1>
        
        <ul class="galleries-list">
        {% for gallery in site.galleries %}
            <li><a href="{{ gallery.url }}">{{ gallery.title }}</a></li>
        {% endfor %}
        </ul>
    </div>
    
    {% include footer.html %}
</body>
</html>
