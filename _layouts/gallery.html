<!DOCTYPE HTML>
<html>
<head>
    {% include header.html %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/css/lightbox.min.css">
    <style>
        .gallery-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        
        .gallery-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .gallery-header h1 {
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
        }
        
        .gallery-header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        
        .gallery-item a {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .back-link {
            text-align: center;
            margin: 2rem 0;
        }
        
        .back-link a {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.1rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="gallery-header">
            <h1>{{ page.title }}</h1>
            <p>{{ page.image_count }} images</p>
        </div>
        
        <div class="gallery-grid">
            {% for image in page.images %}
                <div class="gallery-item">
                    <a href="{{ image }}" data-lightbox="gallery" data-title="{{ page.title }}">
                        <img src="{{ image }}" alt="Gallery image {{ forloop.index }}">
                    </a>
                </div>
            {% endfor %}
        </div>
        
        <div class="back-link">
            <a href="/galleries/">← Back to Galleries</a>
        </div>
    </div>
    
    {% include footer.html %}
    
    <script src="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/js/lightbox.min.js"></script>
</body>
</html>
